<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funções relacionadas a atributos</title>

    <style>
        .noticia {
            font-family: Arial, Helvetica, sans-serif;
            border: 1px solid black;
            background-color: rgb(240, 240, 240);
            border-radius: 10px;
            box-shadow: 2px 2px 6px black;
            padding: 20px;
            margin: 50px;
            width: 400px;

        }
    </style>
</head>

<body>

    <div class="noticia">
        <h1>titulo da noticia</h1>
        <h3 id="sumario">Sumario da noticia</h3>
        <img src="news_1.jfif" alt="imagem noticia">
        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Explicabo, et atque beatae, ea velit excepturi dolore doloremque at quia dolorum nam voluptate aut aspernatur. Nam dolor doloribus aspernatur eveniet provident?</p>


    </div>

    <SCript>
        let elemento = document.querySelector('h3')

        //hasAttribute - 'tem  atributo - x ?'

        elemento.hasAttribute('id');
        console.log('sim');

        //getAttribute - 'capture  o VALOR  do atributo'

        console.log(elemento.getAttribute('id'))

        //setAttribute - 'inclua o atributo('atributo','parâmetro do atributo')'

        elemento.setAttribute('title','Titulo do sumario')

        //removeAttribute - 'exclua o atributo'
        let imagem = document.querySelector('img')
        imagem.removeAttribute('src');

        //attributes - atributos do elemento

        console.log(imagem.attributes);
        




    </SCript>



</body>

</html>
