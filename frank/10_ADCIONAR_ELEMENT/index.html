<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>010 ADICIONAR ELEMENTOS</title>

    <style>
        .caixa {
            font-family: Arial, Helvetica, sans-serif;
            margin: 50px auto;
            width: 400px;
            padding: 20px;
            border: 1px solid gray;
            text-align: center;

        }

        .alerta {
            padding: 5px;
            text-align: center;
            background-color: rgb(255, 0, 0);
            color: white;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="caixa">
        <p>Nesta div apenas existe um parágrafo</p>


    </div>

    <button onclick="executar()">clicar </button>

    <script>

        function executar() {

            //criar o elemento
            let novoElemento = document.createElement('p');
            novoElemento.className = 'alerta'
            novoElemento.textContent = 'Esta é uma mensagem de alerta!';

            //adicionar o novo elemento ao div existente

            let elemnto = document.querySelector('div')
            elemnto.appendChild(novoElemento);
        }
    </script>

</body>

</html>
